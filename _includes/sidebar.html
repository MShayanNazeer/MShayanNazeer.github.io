<aside class="sidebar">
  <div class="sidebar-inner">
    <a href="{{ '/' | relative_url }}" class="sidebar-photo-link">
      <img src="{{ site.profile.photo | relative_url }}" alt="{{ site.author }}" class="sidebar-photo">
    </a>
    <div class="sidebar-identity">
      <p class="sidebar-name">{{ site.profile.display_name }}</p>
      <p class="sidebar-role">{{ site.profile.role_prefix }} <a href="{{ site.profile.role_url }}">{{ site.profile.role_link }}</a></p>
      <p class="sidebar-university"><a href="{{ site.profile.university_url }}" target="_blank" rel="noopener noreferrer">{{ site.profile.university }}</a></p>
    </div>
    <div class="sidebar-social">
      {% for link in site.social %}
      <a href="{{ link.url }}"{% unless link.url contains 'mailto:' %} target="_blank" rel="noopener noreferrer"{% endunless %} aria-label="{{ link.label }}">{% include icon.html name=link.icon %}</a>
      {% endfor %}
    </div>
  </div>
</aside>
